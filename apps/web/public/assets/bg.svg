<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
    </filter>
    <radialGradient id="glow" cx="50%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#1e2433" />
      <stop offset="55%" stop-color="#12141c" />
      <stop offset="100%" stop-color="#0b0d13" />
    </radialGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#glow)" />
  <rect width="1200" height="1200" filter="url(#grain)" opacity="0.04" />
</svg>
